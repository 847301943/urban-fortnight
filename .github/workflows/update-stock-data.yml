name: 更新并发布大A智能选股网页

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # 北京时间工作日 18:25；GitHub cron 使用 UTC
    - cron: "25 10 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: 取出仓库文件
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 获取长期与短线数据
        env:
          DETAIL_LIMIT: "180"
          DETAIL_WORKERS: "5"
          ANNUAL_YEARS: "4"
          QUARTERS_TO_TRY: "6"
          FINANCIAL_DETAIL_LIMIT: "260"
          FINANCIAL_DETAIL_WORKERS: "4"
          DIVIDEND_DETAIL_LIMIT: "220"
          DIVIDEND_DETAIL_WORKERS: "4"
          SHORT_HISTORY_LIMIT: "1200"
          SHORT_HISTORY_WORKERS: "6"
          SHORT_HISTORY_CALENDAR_DAYS: "820"
          SHORT_MIN_AMOUNT: "150000000"
          SHORT_MIN_PRICE: "2"
          SHORT_MAX_PRICE: "200"
          SNAPSHOT_EASTMONEY_TIMEOUT: "75"
          SNAPSHOT_SINA_TIMEOUT: "150"
          SNAPSHOT_FALLBACK_MAX_AGE_DAYS: "5"
        run: python scripts/update_data.py

      - name: 回测短线信号并审计缺失数据
        env:
          BACKTEST_LIMIT: "500"
          BACKTEST_HOLDING_DAYS: "1"
          BACKTEST_FEE_BPS: "20"
        run: python scripts/backtest_short.py

      - name: 准备网页文件
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll
          cp -r data _site/data

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传网页
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 发布网页
        id: deployment
        uses: actions/deploy-pages@v4
